<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Number Generator</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
    }

    #numberDisplay {
      font-size: 3rem;
      margin: 1rem;
    }

    button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background-color: #1f8b4c;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #16663a;
    }

    #history {
      margin-top: 2rem;
      max-width: 90vw;
      font-size: 1.2rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="numberDisplay">-- --</div>
  <button onclick="generate()">Klik Saya</button>
  <div id="history"></div>

  <script>
    let count = 0;
    const maxCount = 10;
    let history = [];
    let finished = false;
    let showList = false;

    function getRandomNumber() {
      return Math.floor(Math.random() * 100).toString().padStart(2, '0');
    }

    function generate() {
      const display = document.getElementById("numberDisplay");
      const historyDiv = document.getElementById("history");

      if (!finished) {
        if (count < maxCount) {
          const a = getRandomNumber();
          const b = getRandomNumber();
          const value = `${a} ${b}`;
          display.textContent = value;
          history.push(value);
          count++;
          if (count === maxCount) {
            display.textContent = "Selesai!";
            historyDiv.innerHTML = "<p>Klik lagi untuk melihat semua hasil.</p>";
            finished = true;
          }
        }
      } else if (!showList) {
        // Menampilkan hasil setelah klik ke-11
        showHistory();
        showList = true;
      } else {
        // Reset semua
        count = 0;
        history = [];
        finished = false;
        showList = false;
        display.textContent = "-- --";
        historyDiv.innerHTML = "";
      }
    }

    function showHistory() {
      const listItems = history.map(item => `<li>${item}</li>`).join('');
      document.getElementById("history").innerHTML = `
        <h3>Hasil:</h3>
        <ul>${listItems}</ul>
        <p>Klik untuk mulai ulang</p>
      `;
    }
  </script>
</body>
</html>
